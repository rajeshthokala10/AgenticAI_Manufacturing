# Manufacturing (industrial) knowledge-graph schema.
#
# Declarative ontology adopted from kgrag's L1 contract. The Python KG builder
# validates every node and edge against this schema at construction time; the
# gap detector walks the schema against the constructed graph to surface
# missing / conflicting / low-confidence edges for HITL review.
#
# This file is the *industrial / plant-floor* domain. Aviation / piston-engine
# entities live in ``schemas/aviation.yaml`` and are loaded against a
# separate Qdrant collection + separate KG file. See ``config.SCHEMA_PATHS``.

version: 1
domain: manufacturing
# Display metadata — read by config.DOMAIN_DISPLAY and used by every UI
# affordance (Streamlit sidebar selector, per-message pills, Next.js
# chat-header switcher). Override to rebrand or recolor.
display:
  label: Manufacturing
  emoji: "🏭"
  color: "#475569"   # slate-600

entity_types:
  - name: Equipment
    description: Plant-floor equipment instance with a site asset tag.
    id_pattern: '^(?:P|CV|HP|CNC|STAMP|WELD|HT|COAT)-[A-Z0-9]{1,3}-?\d{2,4}$'
    case_sensitive: false

  - name: Component
    description: A sub-component of equipment (bearing, seal, impeller, …).
    case_sensitive: false
    vocabulary:
      - impeller
      - seal
      - bearing
      - coupling
      - motor
      - shaft
      - belt
      - roller
      - tensioner
      - sensor
      - vfd
      - gearbox
      - cylinder
      - valve
      - accumulator
      - platen
      - pump
      - filter
      - gasket
      - o-ring
      - bushing
      - encoder

  - name: Alarm
    description: An alarm code raised by control systems.
    id_pattern: '^ALM-[A-Z]\d{3}$'

  - name: FailureMode
    description: A failure-mode / fault-code instance.
    id_pattern: '^FC-\d{3}$'

  - name: Symptom
    description: |
      An observed condition extracted from narrative text. Intentionally
      open-vocab so the NarrativeExtractor can surface arbitrary phrases
      for HITL review.

  - name: Cause
    description: A root-cause candidate. Closed vocabulary.
    case_sensitive: false
    vocabulary:
      - bearing wear
      - seal leak
      - belt slip
      - misalignment
      - overheating
      - cavitation
      - contamination
      - electrical fault
      - control loop instability

  - name: Procedure
    description: A diagnostic / maintenance / repair procedure step.

  - name: SparePart
    description: A spare-part number from the BOM.
    id_pattern: '^(SP|TH|BRK|SFT|HSG|GR)-\d{4}$'

  - name: Specification
    description: A spec value (pressure, temperature limit, etc.).

edge_types:
  - name: HAS_COMPONENT
    source: Equipment
    target: Component
    min_cardinality: 1

  - name: TRIGGERS_ALARM
    source: Equipment
    target: Alarm

  - name: CAUSES_FAILURE
    source: [Equipment, Alarm, Cause]
    target: FailureMode

  - name: HAS_SYMPTOM
    source: Equipment
    target: Symptom

  - name: HAS_CAUSE
    source: [Symptom, FailureMode, Equipment]
    target: Cause

  - name: RESOLVED_BY
    source: [FailureMode, Symptom]
    target: Procedure

  - name: REQUIRES_PART
    source: Equipment
    target: SparePart

  - name: FOLLOWS_PROCEDURE
    source: [FailureMode, Symptom]
    target: Procedure

  - name: HAS_SPECIFICATION
    source: Equipment
    target: Specification

traversal_routes:
  symptom_to_fix:
    seed_types: [Symptom]
    walk: [HAS_CAUSE, CAUSES_FAILURE, RESOLVED_BY]
  alarm_to_procedure:
    seed_types: [Alarm]
    walk: [CAUSES_FAILURE, RESOLVED_BY]
  equipment_to_parts:
    seed_types: [Equipment]
    walk: [HAS_COMPONENT, REQUIRES_PART]

gap_thresholds:
  low_confidence: 0.7
  retrieval_floor: 0.0

# Per-domain LLM system prompts. Anything left out falls back to the
# module-level constants in core/{orchestrator,critic,procedure_drafter,
# cause_ranker,query_formatter}.py — which are themselves manufacturing-
# flavoured, so the fallback is benign for manufacturing-adjacent domains
# and a clear authoring TODO for everything else.
prompts:
  persona: manufacturing diagnostic copilot
  answer_system: |
    You are a manufacturing diagnostic copilot. You provide evidence-grounded answers
    to equipment troubleshooting, maintenance, and operational queries.

    RULES:
    1. Only use information from the provided evidence chunks. Do not hallucinate.
    2. Cite your sources using [source_name, chunk_id] format.
    3. For troubleshooting queries, provide: Diagnosis, Root Cause candidates, Recommended Procedure, and Safety notes.
    4. Always reference specific equipment IDs, alarm codes, and part numbers when available.
    5. If evidence is insufficient, state what is missing rather than guessing.
    6. Prioritize safety-critical information.
  retry_system: |
    You are a manufacturing diagnostic copilot. Your previous answer was rejected by the
    quality critic for the following reasons. Generate an improved answer that addresses the issues.

    CRITIC FEEDBACK:
    {critic_feedback}

    RULES:
    1. Only use information from the provided evidence chunks. Do not hallucinate.
    2. Address every issue raised by the critic.
    3. Cite your sources using [source_name, chunk_id] format.
    4. Be more conservative — if evidence is uncertain, say so explicitly.
  critic_rules: |
    You are a strict quality critic for manufacturing diagnostic answers.
    Your job is to evaluate whether an answer is GROUNDED in the provided evidence.

    Evaluate the answer against these criteria:
    1. FACTUAL GROUNDING: Every claim must be traceable to a source chunk. No hallucinated facts.
    2. COMPLETENESS: The answer should address the core question.
    3. TECHNICAL ACCURACY: Equipment IDs, alarm codes, procedures must match the source data.
    4. ACTIONABILITY: For troubleshooting queries, the answer must provide concrete next steps.
    5. SAFETY: Any safety-critical procedures must include proper warnings.

    Respond in this exact format:
    VERDICT: PASS or FAIL
    CONFIDENCE: 0.0 to 1.0
    ISSUES: (list any issues found, or "None")
    SUGGESTION: (if FAIL, describe what needs to change)
  procedure_system: |
    You are a manufacturing diagnostic copilot drafting a step-by-step
    procedure for the user's troubleshooting query.

    RULES:
    1. The output MUST be STRICT JSON ONLY — a single object with key "steps".
    2. Each step is an object: {"step": <int>, "action": "<imperative sentence>",
       "citations": ["chunk_id_a", ...]}.
    3. Every ``citations`` entry MUST be copied verbatim from the retrieved
       evidence headers. Do NOT invent chunk ids.
    4. Sequence the steps so safety preconditions (LOTO, de-energise, vent
       pressure) come BEFORE any inspection or component handling.
    5. Address the highest-ranked causes first. Reference equipment IDs and
       alarm codes by name.
    6. 5-10 steps total. Keep each action short (one sentence, imperative).
    7. No prose before or after the JSON. No markdown fences.
  cause_rank_system: |
    You are a manufacturing root-cause analyst. Given a problem query and a set of
    evidence chunks, identify and rank the most likely ROOT CAUSES.

    RULES:
    1. Every cause MUST be grounded in the evidence chunks provided. Do not invent causes.
    2. Output STRICT JSON ONLY — a list of objects with keys: "cause", "score", "rationale", "evidence_chunk_ids".
    3. "score" is a float in [0.0, 1.0] representing likelihood given the evidence. Use distinct scores.
    4. "evidence_chunk_ids" is a list of chunk_id strings copied verbatim from the evidence headers.
    5. Rank from MOST LIKELY (top) to LEAST LIKELY (bottom).
    6. Return AT MOST {top_k} causes.
    7. If the query is not about troubleshooting / failure analysis, return an empty list [].
    {taxonomy_clause}
    8. No prose before or after the JSON. No markdown fences.
  classify_system: |
    You classify manufacturing queries into exactly one intent category.

    Categories:
    - troubleshoot: diagnosing failures, root cause analysis, equipment faults, alarms tripping
    - procedure: step-by-step instructions for maintenance, replacement, calibration, installation
    - specification: looking up part specs, ratings, tolerances, dimensions, torque values
    - alarm: understanding specific alarm/fault codes, their meaning and response actions
    - inventory: spare parts availability, ordering, stock levels, lead times
    - general: anything that doesn't fit the above categories

    Respond with ONLY a JSON object, no other text:
    {"intent": "<category>", "confidence": <0.0-1.0>}
  risk_grader_system: You are a plant-safety risk grader. Return one float in [0,1].
  risk_grader_user: |
    On a scale of 0.0 (clearly safe to auto-approve) to 1.0 (must be reviewed by a human supervisor),
    score the operational risk of executing the following proposed action in a manufacturing plant.
    Reply with ONE number only, no prose.

# HITL escalation keywords. The criticality classifier escalates to a human
# supervisor when any of these appear in the query or proposed answer. Leave
# blank to fall back to ``config.HITL_HIGH_RISK_KEYWORDS``.
safety:
  high_risk_keywords:
    - lockout
    - tagout
    - hot work
    - fire
    - explosion
    - h2s
    - arc flash
    - confined space
    - fatal
    - injury
    - death
    - toxic
    - asphyxiation
    - radiation
    - permit-to-work
    - shutdown
    - emergency

# Structured procedure drafter — opt in/out and customise the trigger
# intents. Schemas that omit this block fall back to the legacy hardcoded
# trigger list in core/cause_ranker._TROUBLESHOOTING_TRIGGERS, so dropping
# the block is also benign. New domains where step-by-step procedures
# don't make sense (legal lookup, medical reference, market research)
# should set ``enabled: false``.
procedure:
  enabled: true
  # Substrings; ``trigger in intent`` is the match rule, so "diagnos"
  # catches diagnose / diagnosis / diagnostic etc.
  trigger_intents:
    - troubleshoot
    - troubleshooting
    - root_cause
    - rootcause
    - failure
    - fault
    - repair
    - fix
    - incident
    - broken
    - alarm
    - diagnos

# UX copy surfaced by Streamlit + the Next.js header. Lets the schema YAML
# be the single per-domain edit a user makes — no app.py / page.tsx touch
# required when onboarding a new domain.
placeholder: "Ask anything about manufacturing operations…"
empty_state:
  heading: "How can I help with the line today?"
  blurb: >
    I can troubleshoot equipment, look up KPIs, compare suppliers, and
    explain procedures — all grounded in your manufacturing documents.
examples:
  - "What is the OEE target for Q2 2026?"
  - "Pump P-203 has high vibration alarm ALM-P001. Cause and fix?"
  - "Why did CNC Line 4 shut down in February?"
  - "Compare Nippon Steel vs ArcelorMittal"
  - "Belt tracking deviation on conveyor CV-301"
  - "Hydraulic press HP-401 pressure loss — diagnose"
  - "What is the CAPA process for critical NCR?"
  - "maintanance schedul for spindle bearings"
  - "PLC fault code FC-003 on conveyor CV-302"
  - "scrap rate for welding Plant A vs Plant B"
